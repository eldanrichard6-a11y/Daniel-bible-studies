<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Pro Music - Daniel Store</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #1DB954; font-size: 2.2rem; margin-bottom: 5px; }
        .code-tags { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tag { background: #333; padding: 5px 12px; border-radius: 15px; font-size: 11px; color: #1DB954; border: 1px solid #1DB954; }
        .search-box { margin: 25px 0; }
        input { padding: 15px; width: 60%; border-radius: 30px; border: none; background: #222; color: white; outline: none; }
        button#search-btn { padding: 15px 25px; border-radius: 30px; border: none; background: #1DB954; color: white; font-weight: bold; cursor: pointer; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: #181818; padding: 12px; border-radius: 12px; border: 1px solid #333; }
        .card img { width: 100%; border-radius: 8px; }
        .card h3 { font-size: 13px; margin: 10px 0; height: 32px; overflow: hidden; }
        .pay-options { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .btn-pay { background: #1DB954; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-usd { background: #ffc107; color: black; border: none; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Code Pro 🎵💻</h1>
    <div class="code-tags">
        <span class="tag">Python</span><span class="tag">C#</span>
        <span class="tag">C++</span><span class="tag">Swift</span>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Migos or any artist...">
        <button id="search-btn" onclick="tafutaMuziki()">Search</button>
    </div>

    <div id="results">
        </div>

    <script>
        // 1. KODI YA KUTAFUTA MUZIKI
        async function tafutaMuziki() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            if (!query) return alert("Andika jina la wimbo!");

            container.innerHTML = "<p>Searching global hits...</p>";

            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=12`);
                const data = await response.json();
                container.innerHTML = "";

                data.results.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${song.artworkUrl100.replace('100x100', '400x400')}" alt="cover">
                        <h3>${song.trackName}</h3>
                        <div class="pay-options">
                            <button class="btn-pay" onclick="lipiaWimbo('${song.trackName}', 'TZS 13,500')">Lipa TZS 13,500 (Mobile)</button>
                            <button class="btn-usd" onclick="lipiaWimbo('${song.trackName}', '$5.00')">Pay USD $5.00 (Global)</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = "Network error!"; }
        }

        // 2. KODI YA MALIPO (DIRECT TO YOU)
        function lipiaWimbo(wimbo, bei) {
            let maelezo = `Sajili malipo ya ${wimbo} (${bei})\n\n` +
                          `TUMA PESA KWENDA:\n` +
                          `Namba: 0621645957 (Eldan Richard)\n` +
                          `Mtandao: HALOTEL / M-PESA\n\n` +
                          `Baada ya kutuma, weka namba ya muamala hapa chini:`;
            
            let transactionId = prompt(maelezo);

            if (transactionId && transactionId.length >= 6) {
                alert("Asante! Tunahakiki muamala: " + transactionId);
                setTimeout(() => {
                    alert("Malipo yamethibitishwa! Wimbo wako umeanza kupakuliwa.");
                    // Hapa mteja anapewa download link
                }, 4000);
            } else if (transactionId) {
                alert("Namba ya muamala ni fupi mno. Jaribu tena.");
            }
        }
    </script>
</body>
</html>
